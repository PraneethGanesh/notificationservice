services:
  notificationservice:
    build: .
    container_name: notificationservice
    ports:
      - "8100:8100"

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - notificationservice